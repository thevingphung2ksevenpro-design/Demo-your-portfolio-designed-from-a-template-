<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dự án Website - Coursera</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Khung viền ngoài bao bọc toàn bộ trang web -->
    <div class="wrapper">
        
        <!-- 1. Khu vực Logo thương hiệu -->
        <header class="section-box logo-section">
            <img src="logo-duanweb.png" alt="Logo Dự án Web" class="logo-img">
        </header>

        <!-- 2. Banner tiêu đề chính -->
        <section class="section-box title-section">
            <h1>Dự án Website - Coursera</h1>
        </section>

        <!-- 3. Khối nội dung số 1: Dự án IOT -->
        <div class="section-box card-section">
            <img src="https://lh3.googleusercontent.com/proxy/Y0WOWbbULEfMgCtldXSQ2L0QK8pCF0DOQy8QrfovAgwmK0xX2ONkeBDlsoKPvC4HRRcCVg4TrKF4omYFol2vYM1oVLuqxQlIY3wMQmIRelo49RhXUKjNRzgam8ux70pPLFi2" alt="Sơ đồ kết nối hệ thống vi điều khiển và thiết bị thông minh IoT" class="card-img">
            <h2 class="card-text">Dự án IOT</h2>
        </div>

        <!-- 4. Khối nội dung số 2: Mô tả đàn Nhị -->
        <div class="section-box card-section">
            <img src="https://cdn.shopify.com/s/files/1/0604/1947/3475/files/dan-nhi-1_480x480.jpg?v=1732937510" alt="Chi tiết cấu tạo nhạc cụ truyền thống Đàn Nhị Việt Nam" class="card-img">
            <h2 class="card-text">Mô tả đàn Nhị</h2>
        </div>

        <!-- 5. Khối nội dung số 3: Vovinam -->
        <div class="section-box card-section">
            <img src="https://upload.wikimedia.org/wikipedia/vi/5/50/Phu_hieu_vovinam.png" alt="Huy hiệu môn phái võ thuật Vovinam Việt Võ Đạo" class="card-img">
            <h2 class="card-text">Vovinam</h2>
        </div>

        <!-- 6. Chân trang (Footer) -->
        <footer class="section-box footer-section">
            <p>@ 2026 - Bản Quyền bởi vinh</p>
        </footer>
    </div>

    <!-- Nhúng file xử lý logic JavaScript -->
    <script src="script.js"></script>
</body>
</html>
